<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory Layout Designer v1.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; overflow: hidden; }

  /* --- Template Styles (these survive export) --- */
  .container {
    display: grid;
    grid-template-columns: 60% 40%;
    grid-template-rows: 50% 50%;
    gap: 6px;
  }
  .quad {
    border: 2px solid #333;
    border-radius: 6px;
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .quad-header {
    background: #2c3e50;
    color: #fff;
    padding: 6px 12px;
    font-weight: bold;
    font-size: 14px;
    border-radius: 4px 4px 0 0;
  }
  .quad-body {
    flex: 1;
    padding: 10px;
    color: #999;
    font-size: 13px;
  }

  /* --- Designer Tools Styles (stripped on export) --- */
  .designer-tools .action-bar {
    height: 36px;
    background: #2c3e50;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .designer-tools .action-bar .title { color:#fff; font-size:13px; font-weight:bold; margin-right:auto; }
  .action-btn {
    padding: 4px 14px;
    background: #fff;
    border: 1px solid #999;
    border-radius: 3px;
    font-size: 11px;
    font-weight: bold;
    color: #2c3e50;
    cursor: pointer;
  }
  .action-btn:hover { background: #eaf2f8; }

  .designer-tools .toolbar {
    height: 70px;
    background: #ecf0f1;
    border-bottom: 2px solid #bdc3c7;
    display: flex;
    align-items: center;
    padding: 6px 16px;
    gap: 8px;
    overflow-x: auto;
  }
  .toolbar-label { color:#2c3e50; font-weight:bold; font-size:12px; white-space:nowrap; margin-right:6px; }
  .tool-btn {
    min-width: 70px;
    height: 44px;
    background: #fff;
    border: 2px solid #2c3e50;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: #2c3e50;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
    padding: 4px 6px;
  }
  .tool-btn:hover { background: #eaf2f8; }

  .canvas { width: 100%; height: calc(100vh - 106px); }

  .guide-outline { stroke:#bdc3c7; stroke-width:2; stroke-dasharray:8 4; fill:none; }
  .guide-divider { stroke:#bdc3c7; stroke-width:1; stroke-dasharray:4 4; }
  .guide-label { fill:#bdc3c7; font-size:11px; font-family:Arial; }

  #renameInput {
    display:none; position:fixed;
    border:2px solid #2c3e50; font-size:12px; font-weight:bold;
    font-family:Arial; padding:2px 4px; outline:none; z-index:100;
  }

  #toolPopup {
    display:none; position:fixed;
    background:#fff; border:2px solid #2c3e50; border-radius:4px;
    padding:10px; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,0.2);
    min-width: 240px;
  }
  #toolPopup .pop-header {
    font-size:12px; font-weight:bold; color:#fff; background:#2c3e50;
    padding:4px 8px; margin:-10px -10px 8px -10px; border-radius:2px 2px 0 0;
  }
  #toolPopup label { font-size:11px; font-weight:bold; color:#2c3e50; display:block; margin-bottom:2px; }
  #toolPopup .pop-type { font-size:11px; color:#999; margin-bottom:6px; }
  #toolPopup input {
    width:100%; padding:4px 6px; border:1px solid #999; border-radius:3px;
    font-size:12px; margin-bottom:8px; display:block;
  }
  #toolPopup .pop-btns { display:flex; gap:6px; }
  .pop-btn {
    padding:4px 12px; border:1px solid #999; border-radius:3px;
    font-size:11px; font-weight:bold; cursor:pointer; background:#fff;
  }
  .pop-btn.ok { background:#2c3e50; color:#fff; }
  .pop-btn.del { color:#e74c3c; border-color:#e74c3c; }
</style>
</head>
<body>

<!-- @@@@ DESIGNER_TOOLS id:component @@@@ -->
<div class="designer-tools" id="designerTools">

  <div class="action-bar">
    <div class="title">Factory Layout Designer v1.0</div>
    <button class="action-btn" onclick="saveLayout()">SAVE</button>
    <button class="action-btn" onclick="loadLayout()">LOAD</button>
    <button class="action-btn" onclick="exportHTML()">EXPORT</button>
    <button class="action-btn" onclick="clearCanvas()">CLEAR</button>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="toolbar-label">TOOLS:</div>
  </div>

  <input id="renameInput" type="text" />

  <div id="toolPopup">
    <div class="pop-header" id="popHeader">Tool Settings</div>
    <div class="pop-type" id="popType"></div>
    <label>NAME:</label>
    <input id="popName" type="text" placeholder="e.g. Ranch" />
    <label>TOKEN:</label>
    <input id="popToken" type="text" placeholder="e.g. get-ranches" />
    <div class="pop-btns">
      <button class="pop-btn ok" onclick="saveTool()">OK</button>
      <button class="pop-btn" onclick="closeTool()">CANCEL</button>
      <button class="pop-btn del" onclick="deleteTool()">DELETE</button>
    </div>
  </div>

</div>
<!-- @@@@ /DESIGNER_TOOLS @@@@ -->

<!-- @@@@ TEMPLATE_CANVAS id:2x2 @@@@ -->
<svg class="canvas" id="canvas"></svg>
<!-- @@@@ /TEMPLATE_CANVAS @@@@ -->

<!-- @@@@ DESIGNER_SCRIPT id:component @@@@ -->
<script>
  const tools = [
    { id: 'box',      label: 'Box',      w: 160, h: 120 },
    { id: 'grid',     label: 'Grid',     w: 200, h: 140 },
    { id: 'dropdown', label: 'Dropdown', w: 140, h: 32  },
    { id: 'text',     label: 'Text',     w: 180, h: 80  },
    { id: 'input',    label: 'Input',    w: 160, h: 32  },
    { id: 'button',   label: 'Button',   w: 100, h: 36  },
    { id: 'list',     label: 'List',     w: 160, h: 120 },
    { id: 'tabs',     label: 'Tabs',     w: 200, h: 32  },
    { id: 'bar',      label: 'Bar',      w: 240, h: 36  },
    { id: 'label',    label: 'Label',    w: 100, h: 24  },
  ];

  const PAD = 40, GAP = 6;
  const canvas = document.getElementById('canvas');
  const toolbar = document.getElementById('toolbar');
  const renameInput = document.getElementById('renameInput');
  const toolPopup = document.getElementById('toolPopup');
  const popHeader = document.getElementById('popHeader');
  const popType = document.getElementById('popType');
  const popName = document.getElementById('popName');
  const popToken = document.getElementById('popToken');

  let counter = 0, drag = null, activeBox = null;

  // --- 2x2 Guide ---
  function drawGuide() {
    canvas.querySelectorAll('.guide-el').forEach(e => e.remove());
    const cr = canvas.getBoundingClientRect();
    const w = cr.width - PAD*2, h = cr.height - PAD*2;
    const x = PAD, y = PAD, c1 = w*0.6, r1 = h*0.5;

    gEl('rect', { x,y, width:w, height:h, class:'guide-outline guide-el' });
    gEl('line', { x1:x+c1+GAP/2, y1:y, x2:x+c1+GAP/2, y2:y+h, class:'guide-divider guide-el' });
    gEl('line', { x1:x, y1:y+r1+GAP/2, x2:x+w, y2:y+r1+GAP/2, class:'guide-divider guide-el' });

    [['TOP LEFT (60%)', x+c1/2, y+r1/2],
     ['TOP RIGHT (40%)', x+c1+GAP+(w*0.4-GAP)/2, y+r1/2],
     ['BOTTOM LEFT (60%)', x+c1/2, y+r1+GAP+(h*0.5-GAP)/2],
     ['BOTTOM RIGHT (40%)', x+c1+GAP+(w*0.4-GAP)/2, y+r1+GAP+(h*0.5-GAP)/2]
    ].forEach(([t,tx,ty]) => gEl('text', { x:tx, y:ty, 'text-anchor':'middle', 'dominant-baseline':'middle', class:'guide-label guide-el' }, t));
  }

  function gEl(tag, attrs, text) {
    const el = svgCreate(tag, attrs, text);
    const firstG = canvas.querySelector('g');
    if (firstG) canvas.insertBefore(el, firstG); else canvas.appendChild(el);
    return el;
  }

  // --- Toolbar ---
  tools.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tool-btn';
    div.textContent = t.label;
    div.dataset.id = t.id;
    div.addEventListener('mousedown', spawnTool);
    toolbar.appendChild(div);
  });

  function spawnTool(e) {
    e.preventDefault();
    const t = tools.find(x => x.id === e.target.dataset.id);
    if (!t) return;
    counter++;
    const cr = canvas.getBoundingClientRect();
    const g = makeBox(t.label, t.id, e.clientX-cr.left-t.w/2, e.clientY-cr.top-t.h/2, t.w, t.h, '');
    canvas.appendChild(g);
    drag = { el:g, ox:t.w/2, oy:t.h/2, mode:'move' };
  }

  // --- Make a Tool Box ---
  function makeBox(name, type, x, y, w, h, token) {
    const g = svgCreate('g', { transform:`translate(${x},${y})` });
    canvas.appendChild(g);

    svgCreate('rect', { width:w, height:h, rx:4, ry:4, fill:'#fff', stroke:'#333', 'stroke-width':2 }, null, g);
    svgCreate('rect', { width:w, height:22, rx:4, ry:4, fill:'#2c3e50' }, null, g);
    svgCreate('rect', { y:10, width:w, height:12, fill:'#2c3e50' }, null, g);

    const typeLabel = type.charAt(0).toUpperCase()+type.slice(1);
    const displayName = name ? typeLabel + ': ' + name : typeLabel;
    const title = svgCreate('text', { x:6, y:15, fill:'#fff', 'font-size':'11', 'font-weight':'bold', 'font-family':'Arial' }, displayName, g);

    svgCreate('text', { x:6, y:38, fill:'#2980b9', 'font-size':'10', 'font-family':'Arial' }, token || '', g);

    const handle = svgCreate('polygon', {
      points:`${w},${h-12} ${w},${h} ${w-12},${h}`,
      fill:'#999', cursor:'nwse-resize'
    }, null, g);

    g.dataset.w = w;
    g.dataset.h = h;
    g.dataset.name = name;
    g.dataset.type = type;
    g.dataset.token = token || '';

    g.querySelectorAll('rect')[1].addEventListener('mousedown', (e) => startMove(e, g));
    g.querySelectorAll('rect')[2].addEventListener('mousedown', (e) => startMove(e, g));
    title.addEventListener('mousedown', (e) => startMove(e, g));

    title.addEventListener('dblclick', (e) => startRename(e, g));
    g.querySelectorAll('rect')[1].addEventListener('dblclick', (e) => startRename(e, g));

    g.addEventListener('contextmenu', (e) => openTool(e, g));
    handle.addEventListener('mousedown', (e) => startResize(e, g));

    return g;
  }

  function updateBoxDisplay(g) {
    const type = g.dataset.type;
    const name = g.dataset.name;
    const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
    const texts = g.querySelectorAll('text');
    texts[0].textContent = name ? typeLabel + ': ' + name : typeLabel;
    texts[1].textContent = g.dataset.token || '';
  }

  // --- Double-click Rename ---
  function startRename(e, g) {
    e.preventDefault(); e.stopPropagation();
    const cr = canvas.getBoundingClientRect();
    const t = g.transform.baseVal.getItem(0);
    renameInput.style.display = 'block';
    renameInput.style.left = (cr.left + t.matrix.e + 2) + 'px';
    renameInput.style.top = (cr.top + t.matrix.f + 1) + 'px';
    renameInput.style.width = g.dataset.w + 'px';
    renameInput.value = g.dataset.name;
    renameInput.focus(); renameInput.select();

    const finish = () => {
      g.dataset.name = renameInput.value;
      updateBoxDisplay(g);
      renameInput.style.display = 'none';
      renameInput.removeEventListener('blur', finish);
      renameInput.removeEventListener('keydown', onKey);
    };
    const onKey = (ev) => { if (ev.key==='Enter') finish(); if (ev.key==='Escape') { renameInput.style.display='none'; } };
    renameInput.addEventListener('blur', finish);
    renameInput.addEventListener('keydown', onKey);
  }

  // --- Right-click Tool Settings ---
  function openTool(e, g) {
    e.preventDefault(); e.stopPropagation();
    activeBox = g;
    const typeLabel = g.dataset.type.charAt(0).toUpperCase() + g.dataset.type.slice(1);
    popHeader.textContent = typeLabel + ' Settings';
    popType.textContent = 'Type: ' + typeLabel;
    popName.value = g.dataset.name || '';
    popToken.value = g.dataset.token || '';
    toolPopup.style.display = 'block';
    toolPopup.style.left = e.clientX + 'px';
    toolPopup.style.top = e.clientY + 'px';
    popName.focus();
  }

  function saveTool() {
    if (!activeBox) return;
    activeBox.dataset.name = popName.value;
    activeBox.dataset.token = popToken.value;
    updateBoxDisplay(activeBox);
    closeTool();
  }

  function closeTool() { toolPopup.style.display = 'none'; activeBox = null; }

  function deleteTool() {
    if (!activeBox) return;
    activeBox.remove();
    closeTool();
  }

  document.addEventListener('mousedown', (e) => {
    if (toolPopup.style.display === 'block' && !toolPopup.contains(e.target)) closeTool();
  });

  // --- Move & Resize ---
  function startMove(e, g) {
    e.preventDefault(); e.stopPropagation();
    const cr = canvas.getBoundingClientRect();
    const t = g.transform.baseVal.getItem(0);
    drag = { el:g, mode:'move', ox:e.clientX-cr.left-t.matrix.e, oy:e.clientY-cr.top-t.matrix.f };
  }

  function startResize(e, g) {
    e.preventDefault(); e.stopPropagation();
    drag = { el:g, mode:'resize', startX:e.clientX, startY:e.clientY, startW:parseFloat(g.dataset.w), startH:parseFloat(g.dataset.h) };
  }

  document.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const cr = canvas.getBoundingClientRect();
    if (drag.mode === 'move') {
      drag.el.setAttribute('transform', `translate(${e.clientX-cr.left-drag.ox},${e.clientY-cr.top-drag.oy})`);
    }
    if (drag.mode === 'resize') {
      resizeBox(drag.el, Math.max(60, drag.startW+e.clientX-drag.startX), Math.max(30, drag.startH+e.clientY-drag.startY));
    }
  });

  document.addEventListener('mouseup', () => { drag = null; });

  function resizeBox(g, w, h) {
    const rects = g.querySelectorAll('rect');
    rects[0].setAttribute('width',w); rects[0].setAttribute('height',h);
    rects[1].setAttribute('width',w);
    rects[2].setAttribute('width',w);
    g.querySelector('polygon').setAttribute('points', `${w},${h-12} ${w},${h} ${w-12},${h}`);
    g.dataset.w = w; g.dataset.h = h;
  }

  // --- SAVE ---
  function saveLayout() {
    const boxes = [];
    canvas.querySelectorAll('g').forEach(g => {
      const t = g.transform.baseVal.getItem(0);
      boxes.push({ name:g.dataset.name, type:g.dataset.type, x:t.matrix.e, y:t.matrix.f,
        w:parseFloat(g.dataset.w), h:parseFloat(g.dataset.h), token:g.dataset.token||'' });
    });
    localStorage.setItem('factory-layout-v1', JSON.stringify(boxes));
    alert('Layout saved. (' + boxes.length + ' tools)');
  }

  // --- LOAD ---
  function loadLayout() {
    const data = localStorage.getItem('factory-layout-v1');
    if (!data) { alert('No saved layout found.'); return; }
    clearCanvas();
    JSON.parse(data).forEach(b => makeBox(b.name, b.type, b.x, b.y, b.w, b.h, b.token));
    alert('Layout loaded.');
  }

  // --- EXPORT: strips DESIGNER_TOOLS, outputs clean HTML with markers ---
  function exportHTML() {
    const boxes = [];
    canvas.querySelectorAll('g').forEach(g => {
      const t = g.transform.baseVal.getItem(0);
      boxes.push({ name:g.dataset.name, type:g.dataset.type, x:t.matrix.e, y:t.matrix.f,
        w:parseFloat(g.dataset.w), h:parseFloat(g.dataset.h), token:g.dataset.token||'' });
    });
    if (!boxes.length) { alert('Nothing to export.'); return; }

    // Clean HTML — no designer tools, no script, just template + components
    let html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n';
    html += '<title>Factory Template</title>\n<style>\n';
    html += '  * { margin:0; padding:0; box-sizing:border-box; }\n';
    html += '  body { font-family:Arial,sans-serif; height:100vh; padding:8px; background:#f0f0f0; }\n';
    html += '  .container { display:grid; grid-template-columns:60% 40%; grid-template-rows:50% 50%; height:100%; gap:6px; }\n';
    html += '  .quad { border:2px solid #333; border-radius:6px; background:#fff; display:flex; flex-direction:column; }\n';
    html += '  .quad-header { background:#2c3e50; color:#fff; padding:6px 12px; font-weight:bold; font-size:14px; border-radius:4px 4px 0 0; }\n';
    html += '  .quad-body { flex:1; padding:10px; position:relative; }\n';
    html += '  .component { position:absolute; border:2px solid #333; border-radius:4px; background:#fff; overflow:hidden; }\n';
    html += '  .component-header { background:#2c3e50; color:#fff; padding:4px 8px; font-size:12px; font-weight:bold; }\n';
    html += '  .component-body { padding:8px; }\n';
    html += '</style>\n</head>\n<body>\n\n';

    // Figure out which quadrant each box belongs to
    const cr = canvas.getBoundingClientRect();
    const tw = cr.width - PAD*2, th = cr.height - PAD*2;
    const splitX = PAD + tw*0.6;
    const splitY = PAD + th*0.5;

    const quads = { tl:[], tr:[], bl:[], br:[] };
    boxes.forEach(b => {
      const cx = b.x + b.w/2, cy = b.y + b.h/2;
      if (cx < splitX && cy < splitY) quads.tl.push(b);
      else if (cx >= splitX && cy < splitY) quads.tr.push(b);
      else if (cx < splitX && cy >= splitY) quads.bl.push(b);
      else quads.br.push(b);
    });

    const quadNames = { tl:'Tokens / Actions', tr:'Chat', bl:'Grid / Results', br:'Details' };

    html += '<div class="container">\n\n';

    ['tl','tr','bl','br'].forEach(q => {
      html += '  <div class="quad">\n';
      html += '    <div class="quad-header">' + quadNames[q] + '</div>\n';
      html += '    <div class="quad-body">\n';

      quads[q].forEach(b => {
        const marker = (b.name || b.type).toUpperCase().replace(/\s+/g, '_');
        // Position relative to quadrant origin
        html += '      <!-- @@@@ ' + marker + ' id:' + b.type + ' @@@@ -->\n';
        html += '      <div class="component" style="width:' + Math.round(b.w) + 'px;height:' + Math.round(b.h) + 'px;">\n';
        html += '        <div class="component-header">' + (b.name || b.type) + '</div>\n';
        html += '        <div class="component-body">\n';
        if (b.token) html += '          <!-- TOKEN: ' + b.token + ' -->\n';
        html += '          <!-- FACTORY: inject ' + b.type + ' component here -->\n';
        html += '        </div>\n';
        html += '      </div>\n';
        html += '      <!-- @@@@ /' + marker + ' @@@@ -->\n';
      });

      html += '    </div>\n';
      html += '  </div>\n\n';
    });

    html += '</div>\n\n</body>\n</html>';

    const blob = new Blob([html], { type:'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'factory-template-export.html';
    a.click();
  }

  function clearCanvas() { canvas.querySelectorAll('g').forEach(g => g.remove()); }

  // --- SVG Helper ---
  function svgCreate(tag, attrs, text, parent) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
    if (text) el.textContent = text;
    if (parent) parent.appendChild(el);
    return el;
  }

  drawGuide();
</script>
<!-- @@@@ /DESIGNER_SCRIPT @@@@ -->

</body>
</html>
